<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quick! Insulin Types</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8f7f4;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:1rem}
.wrap{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:1.25rem}
.progress-wrap{width:100%;display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:5px;background:#e0ddd6;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width 0.4s ease}
.prog-lbl{font-size:12px;color:#aaa;font-weight:600;min-width:40px;text-align:right}
.card{width:100%;background:#fff;border-radius:20px;border:1.5px solid #e0ddd6;padding:1.25rem 1.5rem;position:relative;overflow:visible;transition:border-color 0.3s,background 0.3s}
.card.correct{border-color:#1D9E75;background:#f0fbf7}
.card.wrong{border-color:#e24b4a;animation:shk 0.4s ease}
canvas#cv{position:absolute;inset:0;pointer-events:none;border-radius:20px;overflow:hidden}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#aaa;margin-bottom:4px;text-align:center}
.card-name{font-size:2.2rem;font-weight:800;color:#111;text-align:center;line-height:1;margin-bottom:1rem}
.graph-wrap{width:100%;position:relative}
.graph-canvas{width:100%;display:block;border-radius:8px}
.axis-label-y{position:absolute;left:-18px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#ccc}
.axis-label-x{text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#ccc;margin-top:4px}
.color-btns{display:flex;gap:12px;justify-content:center;margin-top:0.25rem}
.cbtn{width:40px;height:40px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;outline:none;background:none;display:flex;align-items:center;justify-content:center}
.cbtn:active{transform:scale(0.9)}
.cbtn .dot{width:28px;height:28px;border-radius:50%}
.cbtn.selected{border-color:#111;box-shadow:0 0 0 2px #11111133}
.cbtn:disabled{opacity:0.4;cursor:default}
.next-btn{width:100%;padding:14px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;display:none;transition:background 0.15s}
.next-btn:hover{background:#0F6E56}
.results{width:100%;background:#fff;border-radius:20px;border:1px solid #e0ddd6;padding:2rem 1.5rem;display:none;flex-direction:column;align-items:center;gap:1.25rem}
.results h2{font-size:1.5rem;font-weight:800;color:#111}
.score-row{display:flex;gap:10px;width:100%}
.stat{flex:1;background:#f8f7f4;border-radius:14px;padding:0.75rem;text-align:center}
.stat .n{font-size:1.6rem;font-weight:800;color:#111;line-height:1}
.stat .l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#aaa;margin-top:3px}
.stat.g .n{color:#1D9E75}
.stat.r .n{color:#e24b4a}
.acc-lbl{display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:6px;font-weight:600}
.acc-bg{width:100%;height:8px;background:#f0ede8;border-radius:4px;overflow:hidden}
.acc-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.remark{font-size:14px;color:#555;text-align:center;font-weight:500}
.replay-btn{width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer}
.replay-btn:hover{background:#333}
</style>
</head>
<body>

<div class="wrap" id="quizView">
  <div style="text-align:center;font-size:1.4rem;font-weight:800;color:#111">Quick! Insulin Types</div>
  <div class="progress-wrap">
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-lbl" id="progLbl">0 / 7</div>
  </div>
  <div class="card" id="card">
    <canvas id="cv"></canvas>
    <div class="card-label">Which curve matches</div>
    <div class="card-name" id="cardName">—</div>
    <div class="graph-wrap" style="padding-left:24px">
      <div class="axis-label-y">Effect</div>
      <canvas class="graph-canvas" id="graphCanvas" height="200"></canvas>
    </div>
    <div class="color-btns" id="colorBtns"></div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextCard()">Next Insulin →</button>
</div>

<div class="wrap" id="resultsView" style="display:none">
  <div class="results" style="display:flex">
    <div style="font-size:2.5rem">💉</div>
    <h2>Round Complete!</h2>
    <div class="score-row">
      <div class="stat g"><div class="n" id="rCorrect">—</div><div class="l">First try</div></div>
      <div class="stat r"><div class="n" id="rMissed">—</div><div class="l">Needed retries</div></div>
      <div class="stat"><div class="n" id="rAttempts">—</div><div class="l">Total checks</div></div>
    </div>
    <div style="width:100%">
      <div class="acc-lbl"><span>First-try accuracy</span><span id="rPct">—</span></div>
      <div class="acc-bg"><div class="acc-fill" id="rBar" style="width:0%"></div></div>
    </div>
    <div class="remark" id="rRemark">—</div>
    <button class="replay-btn" onclick="restart()">Play Again</button>
  </div>
</div>

<script>
// 5 curve types. Rapids share one curve/color.
var CURVES = [
  { id:'rapid',    color:'#E8523A', peak:1,   peakH:1.0,  sig:0.35 },
  { id:'regular',  color:'#F0A500', peak:3,   peakH:0.82, sig:0.45 },
  { id:'nph',      color:'#2BBFA4', peak:8,   peakH:0.68, sig:0.55 },
  { id:'longact',  color:'#378ADD', peak:12,  peakH:0.32, sig:1.05 }
];

var CARDS = [
  {name:'Lispro',    curve:0},
  {name:'Aspart',    curve:0},
  {name:'Glulisine', curve:0},
  {name:'Regular',   curve:1},
  {name:'NPH',       curve:2},
  {name:'Glargine',  curve:3},
  {name:'Detemir',   curve:3}
];

var THRESHOLD = 0.018; // draw only where curve is above this

function curveY(c, t) {
  if(t <= 0) return 0;
  var mu = Math.log(c.peak);
  var val = Math.exp(-Math.pow(Math.log(t) - mu, 2) / (2*c.sig*c.sig));
  return c.peakH * val;
}

// Find t where curve crosses threshold, searching between tMin and tMax
function findThresholdT(c, tMin, tMax, rising) {
  for(var i=0; i<60; i++){
    var mid = (tMin+tMax)/2;
    var y = curveY(c, mid);
    if(rising) { if(y < THRESHOLD) tMin=mid; else tMax=mid; }
    else        { if(y > THRESHOLD) tMin=mid; else tMax=mid; }
  }
  return (tMin+tMax)/2;
}




var deck=[], cardIdx=0, cur=null;
var firstTryWrong=false, done=false;
var correctCount=0, missedCount=0, totalChecks=0;

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}




// Log-normal style curve — smooth natural taper, no hard cutoffs
function curveY(c, t) {
  if(t <= 0) return 0;
  if(c.flat) {
    // long-acting: very gentle, wide, low arch — no hard edges
    var mu = Math.log(c.peak);
    var sig = 1.1;
    var val = Math.exp(-Math.pow(Math.log(t) - mu, 2) / (2*sig*sig));
    return c.peakH * val;
  }
  // skewed bell via log-normal
  var mu = Math.log(c.peak);
  var sig = c.sig || 0.55;
  var val = Math.exp(-Math.pow(Math.log(t) - mu, 2) / (2*sig*sig));
  return c.peakH * val;
}

function drawGraph(highlightIdx) {
  var canvas = document.getElementById('graphCanvas');
  var W = canvas.offsetWidth || 380;
  canvas.width = W;
  var H = canvas.height;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  var padL=8, padR=8, padT=10, padB=44;
  var gW = W - padL - padR;
  var gH = H - padT - padB;

  // axes
  ctx.strokeStyle='#ddd';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(padL, padT);
  ctx.lineTo(padL, padT+gH);
  ctx.lineTo(padL+gW, padT+gH);
  ctx.stroke();

  // hour ticks + numbers
  ctx.fillStyle='#bbb';
  ctx.font='bold 10px system-ui';
  ctx.textAlign='center';
  [0,4,8,12,16,20,24].forEach(function(h){
    var x = padL + (h/24)*gW;
    ctx.beginPath();
    ctx.moveTo(x, padT+gH);
    ctx.lineTo(x, padT+gH+5);
    ctx.strokeStyle='#ccc';
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillText(h, x, padT+gH+17);
  });

  // "Hours" label
  ctx.fillStyle='#ccc';
  ctx.font='bold 9px system-ui';
  ctx.fillText('HOURS', padL + gW/2, padT+gH+32);

  // draw each curve only within the range where y > THRESHOLD
  CURVES.forEach(function(c, idx){
    var alpha = 1, lw = 2.5;
    if(highlightIdx !== null && highlightIdx !== undefined) {
      if(idx === highlightIdx) { lw = 3.5; alpha = 1; }
      else { alpha = 0.15; lw = 2; }
    }

    // find where curve rises above and falls below threshold
    var tRise = findThresholdT(c, 0.01, c.peak, true);
    var tFall = findThresholdT(c, c.peak, 24, false);

    ctx.globalAlpha = alpha;
    ctx.strokeStyle = c.color;
    ctx.lineWidth = lw;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    var steps = 400;
    var first = true;
    for(var s=0; s<=steps; s++){
      var t = tRise + (s/steps)*(tFall - tRise);
      var y = curveY(c, t);
      var px = padL + (t/24)*gW;
      var py = padT + gH - y*gH*0.88;
      if(first){ ctx.moveTo(px, py); first=false; }
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  });
}

function buildColorBtns(){
  var wrap = document.getElementById('colorBtns');
  wrap.innerHTML='';
  CURVES.forEach(function(c, idx){
    var btn = document.createElement('button');
    btn.className='cbtn';
    btn.id='cbtn'+idx;
    btn.innerHTML='<div class="dot" style="background:'+c.color+'"></div>';
    btn.onclick=(function(i){return function(){onColorPick(i);};})(idx);
    wrap.appendChild(btn);
  });
}

function onColorPick(idx){
  if(done) return;
  totalChecks++;
  var correct = cur.curve;
  if(idx === correct){
    done = true;
    if(!firstTryWrong) correctCount++; else missedCount++;
    document.getElementById('card').className='card correct';
    // highlight correct curve
    drawGraph(correct);
    // mark button
    document.getElementById('cbtn'+idx).classList.add('selected');
    disableBtns();
    confetti();
    document.getElementById('nextBtn').style.display='block';
    document.getElementById('nextBtn').textContent=(cardIdx+1>=7)?'See Results →':'Next Insulin →';
  } else {
    firstTryWrong = true;
    var card = document.getElementById('card');
    card.className='card wrong';
    setTimeout(function(){card.className='card';},400);
    // briefly highlight wrong pick
    drawGraph(idx);
    setTimeout(function(){if(!done)drawGraph(null);},600);
  }
}

function disableBtns(){
  for(var i=0;i<CURVES.length;i++){
    var b=document.getElementById('cbtn'+i);
    if(b) b.disabled=true;
  }
}

function updateProgress(){
  var pct=Math.round((cardIdx/7)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLbl').textContent=cardIdx+' / 7';
}

function init(){
  deck=shuffle(CARDS);cardIdx=0;
  correctCount=0;missedCount=0;totalChecks=0;
  done=false;firstTryWrong=false;cur=deck[0];
  document.getElementById('quizView').style.display='flex';
  document.getElementById('resultsView').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('card').className='card';
  buildColorBtns();
  document.getElementById('cardName').textContent=cur.name;
  updateProgress();
  setTimeout(function(){drawGraph(null);},50);
}

function nextCard(){
  stopConfetti();
  cardIdx++;
  updateProgress();
  if(cardIdx>=7){showResults();return;}
  cur=deck[cardIdx];
  done=false;firstTryWrong=false;
  document.getElementById('card').className='card';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('cardName').textContent=cur.name;
  buildColorBtns();
  drawGraph(null);
}

function showResults(){
  stopConfetti();
  cardIdx=7;updateProgress();
  var pct=Math.round((correctCount/7)*100);
  var col=pct===100?'#1D9E75':pct>=71?'#378ADD':pct>=57?'#EF9F27':'#e24b4a';
  var remarks=[[100,'Perfect — every insulin locked in! 🎉'],[71,'Strong round — a couple to review.'],[57,'Getting there — keep drilling.'],[0,'Keep at it — another round will help!']];
  var rem=remarks[remarks.length-1][1];
  for(var i=0;i<remarks.length;i++){if(pct>=remarks[i][0]){rem=remarks[i][1];break;}}
  document.getElementById('rCorrect').textContent=correctCount;
  document.getElementById('rMissed').textContent=missedCount;
  document.getElementById('rAttempts').textContent=totalChecks;
  document.getElementById('rPct').textContent=pct+'%';
  document.getElementById('rBar').style.width=pct+'%';
  document.getElementById('rBar').style.background=col;
  document.getElementById('rRemark').textContent=rem;
  document.getElementById('quizView').style.display='none';
  document.getElementById('resultsView').style.display='flex';
}

function restart(){init();}

var particles=[],raf=null;
function confetti(){
  var cv=document.getElementById('cv'),card=document.getElementById('card');
  cv.width=card.offsetWidth;cv.height=card.offsetHeight;
  var ctx=cv.getContext('2d');
  var cols=['#1D9E75','#5DCAA5','#378ADD','#D4537E','#EF9F27','#7F77DD'];
  particles=[];
  for(var i=0;i<60;i++)particles.push({x:Math.random()*cv.width,y:-10-Math.random()*30,w:5+Math.random()*5,h:6+Math.random()*4,c:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-0.5)*4,vy:2+Math.random()*3,a:Math.random()*Math.PI*2,spin:(Math.random()-0.5)*0.18,alpha:1});
  if(raf)cancelAnimationFrame(raf);
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);var any=false;
    particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.a+=p.spin;p.alpha-=0.018;if(p.alpha>0){any=true;ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}});
    if(any)raf=requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);
  }
  draw();
}
function stopConfetti(){if(raf){cancelAnimationFrame(raf);raf=null;}var cv=document.getElementById('cv');if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}

init();
</script>
</body>
</html>
